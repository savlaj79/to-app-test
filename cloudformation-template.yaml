AWSTemplateFormatVersion: '2010-09-09'
Description: 'Todo App Infrastructure on AWS'

Resources:
  TodoAppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Todo App
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: 0.0.0.0/0

  TodoAppEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c02fb55956c7d316
      InstanceType: t2.micro
      SecurityGroupIds:
        - !Ref TodoAppSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y docker git nodejs npm
          systemctl start docker
          systemctl enable docker
          usermod -aG docker ec2-user
          cd /home/ec2-user
          git clone https://github.com/savlaj79/to-app-test.git
          cd to-app-test
          docker-compose up -d

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref TodoAppEC2Instance
  PublicIP:
    Description: Public IP of the instance
    Value: !GetAtt TodoAppEC2Instance.PublicIp
